<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>複式簿記 家計簿</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1efe8">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #f1efe8;
    color: #1a1a1a;
    margin: 0;
    padding: 12px;
  }
  .container { max-width: 780px; margin: 0 auto; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid #d3d1c7;
    background: transparent;
    color: #1a1a1a;
    cursor: pointer;
    font-size: 14px;
  }
  .tab-btn.active { background: #fff; border-color: #888780; font-weight: 600; }
  .card {
    background: #fff;
    border: 1px solid #d3d1c7;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  label { font-size: 13px; color: #5f5e5a; display: block; margin-bottom: 4px; }
  input, select {
    width: 100%;
    height: 38px;
    border: 1px solid #d3d1c7;
    border-radius: 8px;
    padding: 0 10px;
    font-size: 14px;
    background: #fff;
    color: #1a1a1a;
  }
  .row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .field { flex: 1 1 140px; min-width: 130px; }
  button.primary {
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
  }
  button.secondary {
    background: transparent;
    border: 1px solid #d3d1c7;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    color: #1a1a1a;
  }
  button.link {
    border: none;
    background: transparent;
    color: #a32d2d;
    cursor: pointer;
    font-size: 13px;
    padding: 4px;
  }
  table { width: 100%; font-size: 13px; border-collapse: collapse; }
  th { text-align: left; padding: 6px 4px; border-bottom: 1px solid #888780; }
  td { padding: 6px 4px; border-bottom: 1px solid #d3d1c7; }
  .num { text-align: right; }
  .error {
    background: #fcebeb;
    color: #791f1f;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  h3 { margin-top: 0; font-size: 16px; }
  .muted { color: #888780; font-size: 14px; }
  .kv { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  .kv.total { font-weight: 600; border-top: 1px solid #888780; margin-top: 4px; padding-top: 4px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) {
    .grid2 { grid-template-columns: 1fr; }
  }
  .login-screen { max-width: 400px; margin: 80px auto; text-align: center; }
  .login-screen h2 { font-size: 18px; margin-bottom: 8px; }
  .login-screen p { color: #5f5e5a; font-size: 14px; margin-bottom: 24px; }
  button.google {
    background: #fff;
    border: 1px solid #d3d1c7;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 13px;
    color: #5f5e5a;
    flex-wrap: wrap;
    gap: 8px;
  }
  .book-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .book-bar select { flex: 1 1 200px; }
  .period-bar { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 16px; flex-wrap: wrap; }
  .period-bar .field { flex: 1 1 140px; }
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    max-width: 360px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h3 { margin-top: 0; }
  .modal .row { margin-bottom: 16px; }

  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .cal-header h3 { margin: 0; }
  .cal-header button {
    border: 1px solid #d3d1c7;
    background: #fff;
    border-radius: 8px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 15px;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-dow {
    text-align: center;
    font-size: 12px;
    color: #888780;
    padding: 4px 0;
  }
  .cal-cell {
    border: 1px solid #e5e3da;
    border-radius: 6px;
    min-height: 56px;
    padding: 4px;
    cursor: pointer;
    font-size: 11px;
  }
  .cal-cell.empty { border: none; cursor: default; }
  .cal-cell.today { border-color: #1a1a1a; border-width: 2px; }
  .cal-cell:hover:not(.empty) { background: #f7f6f2; }
  .cal-date { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .cal-delta-plus { color: #1b7a3d; }
  .cal-delta-minus { color: #a32d2d; }
  .period-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .period-toggle button.active { background: #fff; border-color: #888780; font-weight: 600; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="login-screen">
    <h2>複式簿記 家計簿</h2>
    <p>読み込み中...</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const DEFAULT_ACCOUNTS = [
  { name: '現金', type: 'asset' },
  { name: '普通預金', type: 'asset' },
  { name: '食費', type: 'expense' },
  { name: '住居費', type: 'expense' },
  { name: '水道光熱費', type: 'expense' },
  { name: '通信費', type: 'expense' },
  { name: '交際費', type: 'expense' },
  { name: '被服費', type: 'expense' },
  { name: '教材費', type: 'expense' },
  { name: '娯楽費', type: 'expense' },
  { name: '交通費', type: 'expense' },
  { name: '雑費', type: 'expense' },
  { name: '仕送り', type: 'revenue' },
  { name: 'アルバイト収入', type: 'revenue' },
  { name: '奨学金', type: 'liability' },
];

const TYPE_LABEL = { asset: '資産', liability: '負債', equity: '純資産', revenue: '収益', expense: '費用' };
const TYPE_ORDER = ['asset', 'liability', 'equity', 'revenue', 'expense'];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function normalDebit(type) { return type === 'asset' || type === 'expense'; }
function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function firstOfMonthStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-01';
}

// 年度基準（4月始まり）のユーティリティ
function fiscalYearOf(dateStr) {
  const [y, m] = dateStr.split('-').map(Number);
  return m >= 4 ? y : y - 1;
}
function fiscalQuarterOf(dateStr) {
  const [, m] = dateStr.split('-').map(Number);
  // 4-6:Q1, 7-9:Q2, 10-12:Q3, 1-3:Q4
  if (m >= 4 && m <= 6) return 1;
  if (m >= 7 && m <= 9) return 2;
  if (m >= 10 && m <= 12) return 3;
  return 4;
}
function fiscalQuarterRange(fy, q) {
  // fyは年度開始年（例: 2026年度 = 2026-04-01始まり）
  const starts = { 1: [fy, 4], 2: [fy, 7], 3: [fy, 10], 4: [fy + 1, 1] };
  const [sy, sm] = starts[q];
  const ey = sm === 10 ? sy : (sm === 1 ? sy : sy);
  const em = sm + 2;
  const startStr = sy + '-' + String(sm).padStart(2, '0') + '-01';
  const endYear = sm + 2 > 12 ? sy + 1 : sy;
  const endMonth = ((sm + 2 - 1) % 12) + 1;
  const lastDay = new Date(endYear, endMonth, 0).getDate();
  const endStr = endYear + '-' + String(endMonth).padStart(2, '0') + '-' + String(lastDay).padStart(2, '0');
  return [startStr, endStr];
}
function fiscalYearRange(fy) {
  return [fy + '-04-01', (fy + 1) + '-03-31'];
}
function calendarYearRange(y) {
  return [y + '-01-01', y + '-12-31'];
}
function calendarQuarterOf(dateStr) {
  const [, m] = dateStr.split('-').map(Number);
  return Math.ceil(m / 3);
}
function calendarQuarterRange(y, q) {
  const startMonth = (q - 1) * 3 + 1;
  const endMonth = startMonth + 2;
  const lastDay = new Date(y, endMonth, 0).getDate();
  return [
    y + '-' + String(startMonth).padStart(2, '0') + '-01',
    y + '-' + String(endMonth).padStart(2, '0') + '-' + String(lastDay).padStart(2, '0'),
  ];
}

let state = {
  user: null,
  books: [],
  currentBookId: null,
  tab: 'entry',
  error: '',
  periodStart: firstOfMonthStr(),
  periodEnd: todayStr(),
  form: { date: todayStr(), memo: '', debit: '', credit: '', amount: '' },
  accForm: { name: '', type: 'expense' },
  modal: null,
  calendarYear: new Date().getFullYear(),
  calendarMonth: new Date().getMonth(), // 0-indexed
  selectedDate: null,
  periodSummaryMode: 'month', // 'month' | 'quarter' | 'year'
  periodSummaryMonth: firstOfMonthStr().slice(0, 7), // 'YYYY-MM'
  periodSummaryFY: fiscalYearOf(todayStr()),
  periodSummaryQ: fiscalQuarterOf(todayStr()),
  periodBasis: 'fiscal', // 'fiscal' | 'calendar'
  pdfExportYear: new Date().getFullYear(),
  pdfExporting: false,
};

function currentBook() {
  return state.books.find(b => b.id === state.currentBookId);
}

function userDocRef() {
  return db.collection('users').doc(state.user.uid);
}

function newDefaultBook(name) {
  return {
    id: uid(),
    name: name || '家計簿',
    accounts: DEFAULT_ACCOUNTS.map(a => ({ ...a, id: uid() })),
    entries: [],
  };
}

async function loadUserData() {
  const doc = await userDocRef().get();
  if (doc.exists) {
    const data = doc.data();
    if (data.books && data.books.length > 0) {
      state.books = data.books;
    } else if (data.accounts || data.entries) {
      const migrated = {
        id: uid(),
        name: 'デフォルト帳簿',
        accounts: data.accounts || DEFAULT_ACCOUNTS.map(a => ({ ...a, id: uid() })),
        entries: data.entries || [],
      };
      state.books = [migrated];
      await saveUserData();
    } else {
      state.books = [newDefaultBook()];
      await saveUserData();
    }
  } else {
    state.books = [newDefaultBook()];
    await saveUserData();
  }
  state.currentBookId = state.books[0].id;
}

function saveUserData() {
  return userDocRef().set({
    books: state.books,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  }, { merge: true });
}

function renderLogin() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="login-screen">
      <h2>複式簿記 家計簿</h2>
      <p>Googleアカウントでログインすると、どの端末からでも同じデータにアクセスできます。</p>
      <button class="google" id="google-login">Googleでログイン</button>
    </div>
  `;
  document.getElementById('google-login').onclick = () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => {
      alert('ログインに失敗しました: ' + err.message);
    });
  };
}

function renderLoading(msg) {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="login-screen"><h2>複式簿記 家計簿</h2><p>${msg}</p></div>`;
}

function render() {
  if (!state.user) { renderLogin(); return; }

  const app = document.getElementById('app');
  app.innerHTML = '';

  const topbar = document.createElement('div');
  topbar.className = 'topbar';
  topbar.innerHTML = `<span>${state.user.email}</span><button class="link" id="logout-btn">ログアウト</button>`;
  app.appendChild(topbar);
  document.getElementById('logout-btn').onclick = () => auth.signOut();

  const bookBar = document.createElement('div');
  bookBar.className = 'book-bar';
  bookBar.innerHTML = `
    <select id="book-select">
      ${state.books.map(b => `<option value="${b.id}" ${b.id === state.currentBookId ? 'selected' : ''}>${b.name}</option>`).join('')}
    </select>
    <button class="secondary" id="book-new">新規帳簿</button>
    <button class="secondary" id="book-rename">名前変更</button>
    <button class="secondary" id="book-delete">削除</button>
  `;
  app.appendChild(bookBar);

  document.getElementById('book-select').onchange = (e) => {
    state.currentBookId = e.target.value;
    state.error = '';
    render();
  };
  document.getElementById('book-new').onclick = () => { state.modal = 'new-book'; render(); };
  document.getElementById('book-rename').onclick = () => { state.modal = 'rename-book'; render(); };
  document.getElementById('book-delete').onclick = () => { state.modal = 'delete-book'; render(); };

  const tabs = document.createElement('div');
  tabs.className = 'tabs';
  [
    ['entry', '仕訳入力'],
    ['journal', '仕訳帳'],
    ['ledger', '総勘定元帳'],
    ['statements', '財務諸表'],
    ['calendar', 'カレンダー'],
    ['periodsummary', '期間集計'],
    ['accounts', '科目管理'],
  ].forEach(([key, label]) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (state.tab === key ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { state.tab = key; state.error = ''; render(); };
    tabs.appendChild(btn);
  });
  app.appendChild(tabs);

  if (state.error) {
    const err = document.createElement('div');
    err.className = 'error';
    err.textContent = state.error;
    app.appendChild(err);
  }

  if (state.tab === 'entry') renderEntry(app);
  else if (state.tab === 'journal') renderJournal(app);
  else if (state.tab === 'ledger') renderLedger(app);
  else if (state.tab === 'statements') renderStatements(app);
  else if (state.tab === 'calendar') renderCalendar(app);
  else if (state.tab === 'periodsummary') renderPeriodSummary(app);
  else if (state.tab === 'accounts') renderAccounts(app);

  if (state.modal) renderModal(app);
}

function renderModal(app) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const modal = document.createElement('div');
  modal.className = 'modal';

  if (state.modal === 'new-book') {
    modal.innerHTML = `
      <h3>新規帳簿を作成</h3>
      <div class="row"><div class="field">
        <label>帳簿名</label>
        <input type="text" id="modal-book-name" placeholder="サークル会計">
      </div></div>
      <div class="row">
        <button class="primary" id="modal-create">作成</button>
        <button class="secondary" id="modal-cancel">キャンセル</button>
      </div>
    `;
    overlay.appendChild(modal);
    app.appendChild(overlay);
    document.getElementById('modal-create').onclick = async () => {
      const name = document.getElementById('modal-book-name').value.trim();
      if (!name) return;
      const book = newDefaultBook(name);
      state.books.push(book);
      state.currentBookId = book.id;
      await saveUserData();
      state.modal = null;
      render();
    };
    document.getElementById('modal-cancel').onclick = () => { state.modal = null; render(); };
  } else if (state.modal === 'rename-book') {
    const book = currentBook();
    modal.innerHTML = `
      <h3>帳簿名を変更</h3>
      <div class="row"><div class="field">
        <label>帳簿名</label>
        <input type="text" id="modal-book-rename" value="${book.name}">
      </div></div>
      <div class="row">
        <button class="primary" id="modal-save">保存</button>
        <button class="secondary" id="modal-cancel">キャンセル</button>
      </div>
    `;
    overlay.appendChild(modal);
    app.appendChild(overlay);
    document.getElementById('modal-save').onclick = async () => {
      const name = document.getElementById('modal-book-rename').value.trim();
      if (!name) return;
      book.name = name;
      await saveUserData();
      state.modal = null;
      render();
    };
    document.getElementById('modal-cancel').onclick = () => { state.modal = null; render(); };
  } else if (state.modal === 'delete-book') {
    const book = currentBook();
    if (state.books.length <= 1) {
      modal.innerHTML = `
        <h3>削除できません</h3>
        <p class="muted">最後の1冊は削除できません。</p>
        <div class="row"><button class="secondary" id="modal-cancel">閉じる</button></div>
      `;
    } else {
      modal.innerHTML = `
        <h3>帳簿を削除</h3>
        <p class="muted">「${book.name}」を削除します。仕訳と科目もすべて失われ、元に戻せません。</p>
        <div class="row">
          <button class="primary" id="modal-confirm-delete" style="background:#a32d2d;">削除する</button>
          <button class="secondary" id="modal-cancel">キャンセル</button>
        </div>
      `;
    }
    overlay.appendChild(modal);
    app.appendChild(overlay);
    const cancelBtn = document.getElementById('modal-cancel');
    if (cancelBtn) cancelBtn.onclick = () => { state.modal = null; render(); };
    const confirmBtn = document.getElementById('modal-confirm-delete');
    if (confirmBtn) confirmBtn.onclick = async () => {
      state.books = state.books.filter(b => b.id !== book.id);
      state.currentBookId = state.books[0].id;
      await saveUserData();
      state.modal = null;
      render();
    };
  } else if (state.modal === 'day-summary') {
    const book = currentBook();
    const date = state.selectedDate;
    const dayEntries = book.entries.filter(e => e.date === date);
    const summary = accountTypeDeltaSummary(dayEntries, book);

    modal.innerHTML = `
      <h3>${date} の科目区分別増減</h3>
      ${dayEntries.length === 0 ? '<p class="muted">この日の仕訳はありません。</p>' : ''}
      ${TYPE_ORDER.map(type => `
        <div class="kv">
          <span>${TYPE_LABEL[type]}</span>
          <span>
            <span class="cal-delta-plus">+${fmt(summary[type].increase)}</span>
            &nbsp;/&nbsp;
            <span class="cal-delta-minus">-${fmt(summary[type].decrease)}</span>
          </span>
        </div>
      `).join('')}
      <div class="row" style="margin-top:16px;">
        <button class="secondary" id="modal-cancel">閉じる</button>
      </div>
    `;
    overlay.appendChild(modal);
    app.appendChild(overlay);
    document.getElementById('modal-cancel').onclick = () => { state.modal = null; state.selectedDate = null; render(); };
  }
}

function accountOptions(selected) {
  const book = currentBook();
  return book.accounts.map(a =>
    `<option value="${a.name}" ${a.name === selected ? 'selected' : ''}>${a.name}</option>`
  ).join('');
}

function renderPeriodBar(app) {
  const bar = document.createElement('div');
  bar.className = 'period-bar';
  bar.innerHTML = `
    <div class="field">
      <label>期間（開始）</label>
      <input type="date" id="period-start" value="${state.periodStart}">
    </div>
    <div class="field">
      <label>期間（終了）</label>
      <input type="date" id="period-end" value="${state.periodEnd}">
    </div>
    <button class="secondary" id="period-clear">全期間表示</button>
  `;
  app.appendChild(bar);
  document.getElementById('period-start').onchange = (e) => { state.periodStart = e.target.value; render(); };
  document.getElementById('period-end').onchange = (e) => { state.periodEnd = e.target.value; render(); };
  document.getElementById('period-clear').onclick = () => {
    state.periodStart = '';
    state.periodEnd = '';
    render();
  };
}

function filteredEntries() {
  const book = currentBook();
  return book.entries.filter(e => {
    if (state.periodStart && e.date < state.periodStart) return false;
    if (state.periodEnd && e.date > state.periodEnd) return false;
    return true;
  });
}

function renderEntry(app) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="row">
      <div class="field">
        <label>日付</label>
        <input type="date" id="f-date" value="${state.form.date}">
      </div>
      <div class="field" style="flex:2 1 240px;">
        <label>摘要</label>
        <input type="text" id="f-memo" value="${state.form.memo}" placeholder="スーパーで食材購入">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>借方科目</label>
        <select id="f-debit"><option value="">選択してください</option>${accountOptions(state.form.debit)}</select>
      </div>
      <div class="field">
        <label>貸方科目</label>
        <select id="f-credit"><option value="">選択してください</option>${accountOptions(state.form.credit)}</select>
      </div>
      <div class="field">
        <label>金額（円）</label>

function computeBalances(entries, book) {
  const map = {};
  book.accounts.forEach(a => { map[a.name] = { type: a.type, debit: 0, credit: 0 }; });
  entries.forEach(e => {
    if (map[e.debit]) map[e.debit].debit += e.amount;
    if (map[e.credit]) map[e.credit].credit += e.amount;
  });
  const result = {};
  Object.entries(map).forEach(([name, v]) => {
    const net = normalDebit(v.type) ? v.debit - v.credit : v.credit - v.debit;
    result[name] = { type: v.type, debit: v.debit, credit: v.credit, balance: net };
  });
  return result;
}

// 指定した仕訳群について、科目区分ごとの増加額・減少額を集計する
// 「増加」「減少」はその区分の正常残高方向を基準にする
// (資産・費用は借方=増加、負債・純資産・収益は貸方=増加)
function accountTypeDeltaSummary(entries, book) {
  const summary = {};
  TYPE_ORDER.forEach(t => { summary[t] = { increase: 0, decrease: 0 }; });
  const accByName = {};
  book.accounts.forEach(a => { accByName[a.name] = a; });

  entries.forEach(e => {
    const debitAcc = accByName[e.debit];
    const creditAcc = accByName[e.credit];
    if (debitAcc) {
      if (normalDebit(debitAcc.type)) summary[debitAcc.type].increase += e.amount;
      else summary[debitAcc.type].decrease += e.amount;
    }
    if (creditAcc) {
      if (normalDebit(creditAcc.type)) summary[creditAcc.type].decrease += e.amount;
      else summary[creditAcc.type].increase += e.amount;
    }
  });
  return summary;
}

// カレンダー: 各日の資産の増加額・減少額を算出
function assetDeltaByDate(book) {
  const map = {};
  const assetNames = new Set(book.accounts.filter(a => a.type === 'asset').map(a => a.name));
  book.entries.forEach(e => {
    if (!map[e.date]) map[e.date] = { increase: 0, decrease: 0 };
    if (assetNames.has(e.debit)) map[e.date].increase += e.amount;
    if (assetNames.has(e.credit)) map[e.date].decrease += e.amount;
  });
  return map;
}

function renderCalendar(app) {
  const book = currentBook();
  const year = state.calendarYear;
  const month = state.calendarMonth; // 0-indexed
  const deltas = assetDeltaByDate(book);
  const today = todayStr();

  const header = document.createElement('div');
  header.className = 'cal-header';
  header.innerHTML = `
    <button id="cal-prev">‹</button>
    <h3>${year}年 ${month + 1}月</h3>
    <button id="cal-next">›</button>
  `;
  app.appendChild(header);
  document.getElementById('cal-prev').onclick = () => {
    state.calendarMonth -= 1;
    if (state.calendarMonth < 0) { state.calendarMonth = 11; state.calendarYear -= 1; }
    render();
  };
  document.getElementById('cal-next').onclick = () => {
    state.calendarMonth += 1;
    if (state.calendarMonth > 11) { state.calendarMonth = 0; state.calendarYear += 1; }
    render();
  };

  const card = document.createElement('div');
  card.className = 'card';

  const grid = document.createElement('div');
  grid.className = 'cal-grid';
  ['日', '月', '火', '水', '木', '金', '土'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay(); // 0=日曜
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < startWeekday; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-cell empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (dateStr === today ? ' today' : '');
    const delta = deltas[dateStr];
    let deltaHtml = '';
    if (delta && (delta.increase || delta.decrease)) {
      deltaHtml = `
        <div class="cal-delta-plus">+${fmt(delta.increase)}</div>
        <div class="cal-delta-minus">-${fmt(delta.decrease)}</div>
      `;
    }
    cell.innerHTML = `<div class="cal-date">${d}</div>${deltaHtml}`;
    cell.onclick = () => { state.selectedDate = dateStr; state.modal = 'day-summary'; render(); };
    grid.appendChild(cell);
  }

  card.appendChild(grid);
  app.appendChild(card);

  const note = document.createElement('p');
  note.className = 'muted';
  note.style.fontSize = '12px';
  note.textContent = '数字は資産勘定の増加額（緑）・減少額（赤）。日付をタップするとその日の科目区分別増減を確認できる。';
  app.appendChild(note);
}

              <th style="text-align:left; padding:4px 6px; border-bottom:1px solid #888;">日付</th>
              <th style="text-align:left; padding:4px 6px; border-bottom:1px solid #888;">借方</th>
              <th style="text-align:left; padding:4px 6px; border-bottom:1px solid #888;">貸方</th>
              <th style="text-align:right; padding:4px 6px; border-bottom:1px solid #888;">金額</th>
              <th style="text-align:left; padding:4px 6px; border-bottom:1px solid #888;">摘要</th>
            </tr>
          </thead>
          <tbody>${journalRows}</tbody>
        </table>
        `}
      </div>

      <div style="margin-bottom:32px;">
        <h2 style="font-size:16px; border-bottom:2px solid #1a1a1a; padding-bottom:4px;">総勘定元帳</h2>
        ${ledgerHtml || '<p style="font-size:13px; color:#888;">データがありません。</p>'}
      </div>

      <div>
        <h2 style="font-size:16px; border-bottom:2px solid #1a1a1a; padding-bottom:4px;">財務諸表</h2>
        <h3 style="font-size:14px; margin:16px 0 6px;">貸借対照表</h3>
        <div style="display:flex; gap:24px;">
          <div style="flex:1;">
            <p style="font-size:12px; color:#5f5e5a; margin:0 0 6px;">資産</p>
            ${assetRowsHtml}
            <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:600; border-top:1px solid #888; margin-top:4px; padding-top:4px;"><span>資産合計</span><span>${fmt(assets)}</span></div>
          </div>
          <div style="flex:1;">
            <p style="font-size:12px; color:#5f5e5a; margin:0 0 6px;">負債・純資産</p>
            ${liabRowsHtml}
            <div style="display:flex; justify-content:space-between; font-size:12px; padding:2px 0;"><span>当期純利益（繰入）</span><span>${fmt(netIncome)}</span></div>
            <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:600; border-top:1px solid #888; margin-top:4px; padding-top:4px;"><span>負債・純資産合計</span><span>${fmt(liabilities + netIncome)}</span></div>
          </div>
        </div>
        <h3 style="font-size:14px; margin:20px 0 6px;">損益計算書</h3>
        <div style="display:flex; justify-content:space-between; font-size:12px; padding:2px 0;"><span>収益合計</span><span>${fmt(revenue)}</span></div>
        <div style="display:flex; justify-content:space-between; font-size:12px; padding:2px 0;"><span>費用合計</span><span>${fmt(expense)}</span></div>
        <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:600; border-top:1px solid #888; margin-top:4px; padding-top:4px;"><span>当期純利益</span><span>${fmt(netIncome)}</span></div>
      </div>
    `;

    document.body.appendChild(container);

    const canvas = await html2canvas(container, { scale: 2, useCORS: true });
    document.body.removeChild(container);

    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageWidth = 210;
    const pageHeight = 297;
    const imgWidth = pageWidth;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    const fileName = `${book.name}_${rangeLabel}.pdf`;
    pdf.save(fileName);
  } catch (err) {
    state.error = 'PDF生成に失敗しました: ' + err.message;
  }

  state.pdfExporting = false;
  render();
}

function renderAccounts(app) {
  const book = currentBook();
  const formCard = document.createElement('div');
  formCard.className = 'card';
  formCard.innerHTML = `
    <div class="row">
      <div class="field">
        <label>科目名</label>
        <input type="text" id="a-name" value="${state.accForm.name}" placeholder="書籍代">
      </div>
      <div class="field">
        <label>区分</label>
        <select id="a-type">${TYPE_ORDER.map(t => `<option value="${t}" ${t === state.accForm.type ? 'selected' : ''}>${TYPE_LABEL[t]}</option>`).join('')}</select>
      </div>
    </div>
    <button class="primary" id="a-submit">科目を追加</button>
  `;
  app.appendChild(formCard);

  document.getElementById('a-submit').onclick = async () => {
    const name = document.getElementById('a-name').value.trim();
    const type = document.getElementById('a-type').value;
    state.error = '';
    if (!name) { state.error = '科目名を入力してください。'; render(); return; }
    if (book.accounts.some(a => a.name === name)) { state.error = '同じ名前の科目が既に存在します。'; render(); return; }
    book.accounts.push({ id: uid(), name, type });
    await saveUserData();
    state.accForm = { name: '', type: 'expense' };
    render();
  };

  const listCard = document.createElement('div');
  listCard.className = 'card';
  let rows = book.accounts.map(a => `
    <tr>
      <td>${a.name}</td>
      <td style="color:#5f5e5a;">${TYPE_LABEL[a.type]}</td>
      <td><button class="link" data-id="${a.id}">削除</button></td>
    </tr>
  `).join('');
  listCard.innerHTML = `
    <table>
      <thead><tr><th>科目名</th><th>区分</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
  app.appendChild(listCard);

  listCard.querySelectorAll('button.link').forEach(btn => {
    btn.onclick = async () => {
      const acc = book.accounts.find(a => a.id === btn.dataset.id);
      if (!acc) return;
      const inUse = book.entries.some(e => e.debit === acc.name || e.credit === acc.name);
      state.error = '';
      if (inUse) { state.error = `科目「${acc.name}」は仕訳で使用されているため削除できません。`; render(); return; }
      book.accounts = book.accounts.filter(a => a.id !== acc.id);
      await saveUserData();
      render();
    };
  });
}

auth.onAuthStateChanged(async (user) => {
  if (user) {
    state.user = user;
    renderLoading('データを読み込んでいます...');
    await loadUserData();
    render();
  } else {
    state.user = null;
    render();
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
</script>
